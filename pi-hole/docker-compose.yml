services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"   # dashboard on 8080 so it doesn't clash with other services
    environment:
      TZ: America/Los_Angeles
      WEBPASSWORD: ""   # put this in .env instead
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped