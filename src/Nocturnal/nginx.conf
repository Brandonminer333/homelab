user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Nextcloud/Jellyfin can send large files (uploads, media info) - raise the default body size limit
    client_max_body_size 10G;

    # Required for WebSocket proxying (Jellyfin playback, Nextcloud notify_push).
    # Sets Connection: upgrade when the client sends an Upgrade header, else close.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
