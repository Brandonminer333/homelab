services:
  nginx:
    image: nginx:latest
    container_name: Norcturnal
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"   # optional: for HTTP->HTTPS redirect
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - /home/branflakes/.tailscale-auth:/etc/nginx/certs:ro
    networks:
      - Oblivion

networks:
  Oblivion:
    external: true