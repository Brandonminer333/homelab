# Path-based reverse proxy for the single Tailscale hostname.
# TLS is terminated here with the Tailscale-issued cert (mounted read-only at
# /etc/nginx/certs). Upstreams are reached over the external "Oblivion" Docker
# network by container name (Rule of Truth: container == src-level dir name).

# Plain HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name lenovoflakes.tail62b305.ts.net;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lenovoflakes.tail62b305.ts.net;

    ssl_certificate     /etc/nginx/certs/lenovoflakes.tail62b305.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/lenovoflakes.tail62b305.ts.net.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ---------------------------------------------------------------------------
    # Landing page at /
    # ---------------------------------------------------------------------------
    location = / {
        default_type text/html;
        return 200 '<!doctype html>\n<html lang="en">\n<head>\n<meta charset="utf-8">\n<meta name="viewport" content="width=device-width, initial-scale=1">\n<title>Homelab</title>\n<style>body{font-family:system-ui,sans-serif;background:#111;color:#eee;display:flex;min-height:100vh;margin:0;align-items:center;justify-content:center}main{text-align:center}h1{font-weight:600;letter-spacing:.02em}a{display:inline-block;margin:.4rem;padding:.7rem 1.4rem;border:1px solid #444;border-radius:.6rem;color:#eee;text-decoration:none}a:hover{background:#222}</style>\n</head>\n<body>\n<main>\n<h1>Homelab</h1>\n<a href="/jellyfin">Jellyfin</a>\n<a href="/nextcloud/">Nextcloud</a>\n<a href="/peryite/">Pi-hole</a>\n</main>\n</body>\n</html>\n';
    }

    # ---------------------------------------------------------------------------
    # Jellyfin (Sanguine) at /jellyfin
    # Requires Jellyfin Dashboard -> Networking -> Base URL set to /jellyfin.
    # ---------------------------------------------------------------------------
    location = /jellyfin {
        return 302 /jellyfin/;
    }

    location /jellyfin/ {
        proxy_pass http://Sanguine:8096/jellyfin/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Protocol $scheme;

        # WebSocket (live playback, session updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Disable buffering so streaming/transcoding is responsive
        proxy_buffering off;
    }

    # ---------------------------------------------------------------------------
    # Nextcloud (HormaeusMora) at /nextcloud
    # Requires OVERWRITEWEBROOT=/nextcloud in the Nextcloud container env.
    # ---------------------------------------------------------------------------
    # Service discovery redirects (DAV) required by Nextcloud clients.
    location = /.well-known/carddav { return 301 /nextcloud/remote.php/dav; }
    location = /.well-known/caldav  { return 301 /nextcloud/remote.php/dav; }
    location = /.well-known/webfinger   { return 301 /nextcloud/index.php/.well-known/webfinger; }
    location = /.well-known/nodeinfo    { return 301 /nextcloud/index.php/.well-known/nodeinfo; }

    location = /nextcloud {
        return 301 /nextcloud/;
    }

    location /nextcloud/ {
        # Trailing slash strips the /nextcloud prefix; the container serves at
        # root and OVERWRITEWEBROOT rewrites generated URLs back under /nextcloud.
        proxy_pass http://HormaeusMora:80/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Large uploads / long-running sync operations
        client_max_body_size 10G;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;

        # Nextcloud recommends these
        proxy_hide_header X-Powered-By;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # ---------------------------------------------------------------------------
    # Pi-hole (Peryite) at /peryite
    # NOTE: Pi-hole's web UI is served at /admin and uses absolute /admin links,
    # so subpath proxying is finicky. We rewrite /admin -> /peryite in responses.
    # Accept-Encoding is cleared so sub_filter can operate on uncompressed bodies.
    # (DNS on port 53 is separate and intentionally not proxied here.)
    # ---------------------------------------------------------------------------
    location = /peryite {
        return 301 /peryite/;
    }

    location /peryite/ {
        proxy_pass http://Peryite/admin/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding   "";

        proxy_redirect /admin/ /peryite/;

        sub_filter_once off;
        # text/html is always filtered; only add the extra types here.
        sub_filter_types text/css application/javascript application/json;
        sub_filter '/admin/' '/peryite/';
        sub_filter 'href="/admin"' 'href="/peryite"';
    }
}
