# Redirect plain HTTP -> HTTPS
server {
    listen 80;
    server_name lenovoflakes.tail62b305.ts.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lenovoflakes.tail62b305.ts.net;

    ssl_certificate     /etc/nginx/certs/lenovoflakes.tail62b305.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/lenovoflakes.tail62b305.ts.net.key;

    # ---- Jellyfin ----
    # Jellyfin needs to know it's mounted under /jellyfin (set in its own admin dashboard too)
    location /jellyfin/ {
        proxy_pass http://jellyfin:8096/jellyfin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Jellyfin does WebSocket for live status/transcoding updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- Nextcloud ----
    location /nextcloud/ {
        proxy_pass http://nextcloud:80/nextcloud/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Nextcloud can have long-running requests (large uploads, sync)
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
    }
}