# Jellyfin (Sanguine) — bind-mount stack for a headless Ubuntu homelab host.
#
# Fill in before first `docker compose up`:
#   1. PUID / PGID — run `id -u` and `id -g` on the host for the user that will own ./config and ./cache
#   2. Media path — replace /path/to/media with the real local library path on the Lenovo (mounted :ro)
#   3. Image tag — check https://github.com/jellyfin/jellyfin/releases for the current stable version
#
# Mount points:
#   ./config  → Jellyfin settings, database, metadata (read-write)
#   ./cache   → transcode and image cache (read-write)
#   /path/to/media → your library on the host disk (read-only)
#
# Access (Tailscale Serve — tailnet only, no NPM):
#   Jellyfin is bound to 127.0.0.1:8096 on the Lenovo. On that host, after the
#   container is up and HTTPS is enabled in the Tailscale admin console:
#
#     tailscale serve --bg 8096
#
#   That proxies localhost:8096 to https://<your-existing-MagicDNS>/ on the
#   tailnet (same machine name you already use for Nextcloud). Tailscale
#   terminates TLS; auth is Tailscale identity/ACLs.
#
#   Coexistence with Nextcloud on the same MagicDNS host:
#     - If Nextcloud stays on a published port (e.g. :8081), Serve on 443 for
#       Jellyfin is fine — different ports, same hostname.
#     - If both use Serve on 443, mount paths instead of competing for /:
#         tailscale serve --bg --set-path=/jellyfin 8096
#       and set JELLYFIN_PublishedServerUrl to that path URL.
#
#   Do NOT use `tailscale funnel` unless you intentionally want public internet
#   exposure. Serve is private to the tailnet.

services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    container_name: Sanguine
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      # Placeholders — override in a .env file next to this compose file.
      # On the host: id -u <user>  and  id -g <user>
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
      # Set to the URL clients should use after Serve is configured, e.g.:
      #   https://<your-MagicDNS>
      #   https://<your-MagicDNS>/jellyfin   (if using --set-path=/jellyfin)
      # JELLYFIN_PublishedServerUrl: https://<your-MagicDNS>
    volumes:
      - ./config:/config
      - ./cache:/cache
      - ./media:/media:ro
    # Localhost only — Tailscale Serve reaches this; LAN/WAN cannot.
    networks:
      - Oblivion
    # Intel QuickSync hardware transcoding (optional):
    # Run `ls -la /dev/dri` on the host first. If renderD128 exists, uncomment the block below and restart.
    # If /dev/dri is missing or empty, leave this commented — Jellyfin will use CPU (software) transcoding.
    # devices:
    #   - /dev/dri:/dev/dri

networks:
  Oblivion:
    external: true
