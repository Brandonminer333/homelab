# qBittorrent behind Proton VPN (Clavicus Vile) + Prowlarr + FlareSolverr
#
# Fill in before first `docker compose up`:
#   1. PUID / PGID — on the Lenovo: `id -u` and `id -g` for the user that owns ./config and ./data
#   2. WIREGUARD_PRIVATE_KEY — from your Proton *.conf [Interface] PrivateKey line only.
#      Gluetun (protonvpn provider) does NOT mount the .conf. Ignore Address, DNS, and [Peer];
#      Gluetun picks Proton servers itself. Example .env:
#        WIREGUARD_PRIVATE_KEY=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=
#      For VPN port forwarding: when creating the WireGuard config in Proton, enable
#      NAT-PMP (and use a Plus/Visionary plan). Without that, PF will fail.
#   3. Optional: SERVER_COUNTRIES (e.g. Netherlands) to pin exit country
#   4. qBittorrent WebUI → enable "Bypass authentication for clients on localhost"
#      so Gluetun can push the forwarded listen port via the WebUI API.
#
# Layout:
#   ./config                      → qBittorrent settings (read-write)
#   ./prowlarr/config             → Prowlarr settings (read-write)
#   ./data/torrents/incomplete    → in-progress downloads
#   ./data/torrents/completed     → finished downloads
#
# Access (localhost + SSH forward — not on Oblivion, not through Tailscale):
#   qBittorrent WebUI → 127.0.0.1:8080
#   Prowlarr WebUI    → 127.0.0.1:9696
#   FlareSolverr      → no host UI; Prowlarr reaches it at http://127.0.0.1:8191
#
#     ssh -L 8080:localhost:8080 -L 9696:localhost:9696 lenovoflakes -N
#
#   Then open http://localhost:8080 and http://localhost:9696
#
# Network model:
#   qBittorrent, Prowlarr, and FlareSolverr all share Gluetun's network namespace
#   so they can reach each other on localhost. Egress is via Proton WireGuard.
#   This stack does NOT join the Oblivion network.
#
# Prowlarr setup:
#   Download client → qBittorrent: http://127.0.0.1:8080
#   Indexer proxy  → FlareSolverr: http://127.0.0.1:8191
#   Tag indexers that need Cloudflare bypass with that proxy tag.

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: ClavicusVile-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # Published on Gluetun because siblings use network_mode: service:gluetun
      - "127.0.0.1:8080:8080"   # qBittorrent WebUI
      - "127.0.0.1:9696:9696"   # Prowlarr WebUI
    environment:
      TZ: America/Los_Angeles
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      # Optional — uncomment / set in .env to prefer a country, e.g. Netherlands
      # SERVER_COUNTRIES: ${SERVER_COUNTRIES:-}
      # Allow host → WebUIs / local torrent port through Gluetun's firewall
      FIREWALL_INPUT_PORTS: 8080,9696,6881
      # Proton VPN server-side port forwarding (random public port → qBittorrent)
      VPN_PORT_FORWARDING: "on"
      PORT_FORWARD_ONLY: "on"
      VPN_PORT_FORWARDING_UP_COMMAND: /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      VPN_PORT_FORWARDING_DOWN_COMMAND: /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:8080/api/v2/app/setPreferences'
    volumes:
      - ./gluetun:/gluetun

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: ClavicusVile
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - ./config:/config
      - ./data/torrents/incomplete:/downloads/incomplete
      - ./data/torrents/completed:/downloads/completed

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: ClavicusVile-prowlarr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
    volumes:
      - ./prowlarr/config:/config

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: ClavicusVile-flaresolverr
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      LOG_LEVEL: info
      TZ: America/Los_Angeles
