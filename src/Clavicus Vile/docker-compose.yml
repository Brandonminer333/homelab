# qBittorrent behind Proton VPN (Clavicus Vile) + Prowlarr + FlareSolverr
#
# Fill in before first `docker compose up`:
#   1. PUID / PGID — on the Lenovo: `id -u` and `id -g` for the user that owns ./config and ./data
#   2. WIREGUARD_PRIVATE_KEY — from your Proton *.conf [Interface] PrivateKey line only.
#      Gluetun (protonvpn provider) does NOT mount the .conf. Ignore Address, DNS, and [Peer];
#      Gluetun picks Proton servers itself. Example .env:
#        WIREGUARD_PRIVATE_KEY=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=
#   3. Optional: SERVER_COUNTRIES (e.g. Netherlands) to pin exit country
#
# Layout:
#   ./config                      → qBittorrent settings (read-write)
#   ./prowlarr/config             → Prowlarr settings (read-write)
#   ./data/torrents/incomplete    → in-progress downloads
#   ./data/torrents/completed     → finished downloads
#
# Access (localhost + SSH forward — not on Oblivion, not through Tailscale):
#   qBittorrent WebUI → 127.0.0.1:8080 (published on the VPN container)
#   Prowlarr WebUI    → 127.0.0.1:9696 (not on the VPN)
#   FlareSolverr      → no host UI; Prowlarr reaches it at http://flaresolverr:8191
#
#     ssh -L 8080:localhost:8080 -L 9696:localhost:9696 lenovoflakes -N
#
#   Then open http://localhost:8080 and http://localhost:9696
#
# Network model:
#   qBittorrent shares Gluetun's network namespace — torrent + its WebUI traffic
#   egresses via Proton WireGuard. Prowlarr + FlareSolverr share the compose
#   default network (outside the VPN) so Prowlarr can use FlareSolverr.
#   This stack does NOT join the Oblivion network.
#
# Prowlarr setup:
#   Settings → Indexers → Indexer Proxies → add FlareSolverr
#   Host: http://flaresolverr:8191
#   Tag indexers that need Cloudflare bypass with that proxy tag.
#
# Note: Prowlarr cannot reach qBittorrent at 127.0.0.1:8080 from another
# container while that port is localhost-bound on the host. To add qBittorrent
# as a Prowlarr download client later, put Prowlarr on network_mode: service:gluetun
# (and publish 9696 on Gluetun) so both share localhost.

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: ClavicusVile-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # qBittorrent WebUI (container listens on 8080; host localhost only)
      - "127.0.0.1:8080:8080"
    environment:
      TZ: America/Los_Angeles
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      # Optional — uncomment / set in .env to prefer a country, e.g. Netherlands
      # SERVER_COUNTRIES: ${SERVER_COUNTRIES:-}
      # Allow host → WebUI through Gluetun's firewall (published port above)
      FIREWALL_INPUT_PORTS: 8080
    volumes:
      - ./gluetun:/gluetun

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: ClavicusVile
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - ./config:/config
      - ./data/torrents/incomplete:/downloads/incomplete
      - ./data/torrents/completed:/downloads/completed

  # Outside the VPN — indexer manager. See header note about qBittorrent linking.
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: ClavicusVile-prowlarr
    restart: unless-stopped
    depends_on:
      - flaresolverr
    ports:
      - "127.0.0.1:9696:9696"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
    volumes:
      - ./prowlarr/config:/config

  # Outside the VPN — Cloudflare bypass for Prowlarr (same compose network).
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: ClavicusVile-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: America/Los_Angeles
    # No host ports — Prowlarr uses http://flaresolverr:8191 on the compose network.
